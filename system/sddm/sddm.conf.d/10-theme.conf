[Theme]
Current=everforest-warrior

[Users]
RememberLastUser=true
RememberLastSession=true

[Wayland]
# SDDM itself greets in Wayland; sessions launch per their .desktop Exec line.
SessionDir=/usr/share/wayland-sessions

[X11]
SessionDir=/usr/share/xsessions

# Uncomment to autologin mpoletiek straight into Hyprland (with D-Bus).
# Session name is the .desktop filename without the extension.
#[Autologin]
#User=mpoletiek
#Session=hyprland-dbus
#Relogin=false
