[General]
# Background image shown behind the login panel.
background=background.jpg

# Darken overlay applied on top of the background (0.0 = none, 1.0 = full).
dimOpacity=0.35

# Monospace font used throughout the greeter. Falls back to system monospace.
fontFamily=JetBrainsMono Nerd Font

# Everforest palette — matches ~/.config/hypr/conf.d/40-look.conf and hyprlock.conf.
bgColor=#2d353b
panelColor=#232a2e
borderColor=#3d484d
fgColor=#d3c6aa
fgDim=#9da9a0
accentColor=#a7c080
accent2Color=#83c092
warnColor=#dbbc7f
failColor=#e67e80
