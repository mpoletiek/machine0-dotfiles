# Pull Plymouth's label module + its text-rendering deps into the initramfs
# so Image.Text() works in script themes (e.g. for showing live OpenRC
# service names during boot). Without this, label.so is absent and
# Image.Text silently no-ops.
#
# dracut auto-resolves ELF dependencies via dracut-install, so listing
# label.so + a font + fontconfig data is enough — pango/cairo/freetype/
# fontconfig/harfbuzz all get pulled in.

install_items+=" /usr/lib64/plymouth/label.so "
install_items+=" /usr/share/fonts/nerdfonts/JetBrainsMonoNerdFont-Regular.ttf "
install_items+=" /etc/fonts "
install_items+=" /usr/share/fontconfig "
