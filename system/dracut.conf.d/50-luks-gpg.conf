add_dracutmodules+=" crypt crypt-gpg lvm btrfs plymouth "
omit_dracutmodules+=" systemd systemd-initrd dracut-systemd systemd-udevd multipath "
force_drivers+=" nvidia nvidia_modeset nvidia_drm nvidia_uvm "
# TEMPLATE: keyfile path is machine-specific. Copy this file to
# 50-luks-gpg.conf.local (gitignored), replace <HOSTNAME> with the real host
# name, and install-themes.sh will install the .local version automatically.
install_items+=" /boot/<HOSTNAME>-luks-key.gpg /etc/modprobe.d/nvidia.conf "
hostonly="no"
use_fstab="yes"
early_microcode="yes"
