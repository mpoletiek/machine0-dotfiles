# --- General Settings ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 100000

# Explicit vi mode for copy-mode (bindings below assume this).
setw -g mode-keys vi

# --- Wayland Clipboard Support ---
set -g set-clipboard on

# Vim-style selection in copy mode:
#   v        - character selection
#   V        - line selection
#   C-v      - rectangle (block) selection
#   r        - toggle rectangle on an existing selection
#   y        - yank selection to CLIPBOARD (Ctrl+Shift+V / Shift+Insert), exit
#   Esc / q  - exit copy mode without copying
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi V     send-keys -X select-line
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind -T copy-mode-vi r     send-keys -X rectangle-toggle

bind -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Paste from system clipboard into tmux (prefix + p)
bind p run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

# --- Keybindings ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Standard Pane Navigation (No Vim integration)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- UI / Theme (Everforest dark — sage green accent) ---
set -g status-position top
set -g status-style "bg=default"

# Status left: session name in accent sage green
set -g status-left "#[fg=#a7c080,bg=default,bold]   #S #[fg=#4f585e,bg=default]│"
set -g status-left-length 24

# Status right: active-pane command  ·  clock  ·  date
set -g status-right "#[fg=#4f585e]│ #[fg=#d3c6aa] #{pane_current_command} #[fg=#4f585e]│ #[fg=#a7c080]󱑒 %H:%M #[fg=#4f585e]│ #[fg=#d3c6aa]󰃭 %Y-%m-%d "
set -g status-right-length 80

# Window tabs
set -g window-status-format         "#[fg=#7a8478,bg=default] #I:#W "
set -g window-status-current-format "#[fg=#a7c080,bg=default,bold] #I:#W #[fg=#83c092]󰓏"
set -g window-status-separator ""

# Borders
set -g pane-border-style        "fg=#4f585e"
set -g pane-active-border-style "fg=#a7c080"

# Message / copy-mode indicator
set -g message-style         "fg=#d3c6aa,bg=#3d484d"
set -g message-command-style "fg=#d3c6aa,bg=#3d484d"
set -g mode-style            "fg=#2d353b,bg=#a7c080"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# --- Resurrect / Continuum options ---
# Restore pane contents in addition to layouts.
set -g @resurrect-capture-pane-contents 'on'
# Auto-restore the last saved session when tmux starts.
set -g @continuum-restore 'on'
# Save interval in minutes (default 15). Lower = fresher restores, more disk writes.
set -g @continuum-save-interval '30'

# --- sessionx options ---
# Default bind is prefix+o; preview shows active pane.
set -g @sessionx-bind 'o'
set -g @sessionx-window-mode 'on'
set -g @sessionx-tree-mode 'on'
set -g @sessionx-preview-enabled 'true'

run '~/.tmux/plugins/tpm/tpm'
