# ================================
# Fonts (patched Nerd Font — icons baked in)
# ================================
font_family       JetBrainsMono Nerd Font Mono
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         11.0
# Disable ligatures only at the cursor position (keeps visible ligatures)
disable_ligatures cursor

# ================================
# Window
# ================================
background_opacity     0.66
inactive_text_alpha    0.6
window_padding_width   8
hide_window_decorations yes
confirm_os_window_close 0

# ================================
# Cursor
# ================================
cursor_shape          beam
cursor_blink_interval 0.5
cursor_trail          3

# ================================
# Scrollback
# ================================
scrollback_lines   10000
# Press ctrl+shift+h to open the scrollback buffer in nvim for search/yank/navigation
scrollback_pager   nvim -u NONE -c "set nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd TermOpen * normal G" -c "silent write! /tmp/kitty_scrollback" -c "te cat /tmp/kitty_scrollback -"

# ================================
# Bell, mouse, selection
# ================================
enable_audio_bell    no
mouse_hide_wait      3.0
copy_on_select       clipboard
strip_trailing_spaces smart

# ================================
# Tabs
# ================================
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted

# ================================
# Shell integration (explicit)
# ================================
# Enables prompt marks (OSC 133), scroll-to-prompt (ctrl+shift+z), last-command
# output selection (ctrl+shift+g), and proper clickable URLs on command output.
shell_integration enabled

# ================================
# Remote control (lets Hyprland/scripts drive kitty)
# ================================
allow_remote_control socket-only
listen_on            unix:@kitty-${USER}

# ================================
# Splits / panes
# ================================
enabled_layouts splits,stack

map ctrl+shift+d launch --location=vsplit --cwd=current
map ctrl+shift+s launch --location=hsplit --cwd=current
map ctrl+shift+z toggle_layout stack

# Focus between splits
map ctrl+shift+left    neighboring_window left
map ctrl+shift+right   neighboring_window right
map ctrl+shift+up      neighboring_window up
map ctrl+shift+down    neighboring_window down

# Move splits around
map ctrl+shift+alt+left    move_window left
map ctrl+shift+alt+right   move_window right
map ctrl+shift+alt+up      move_window up
map ctrl+shift+alt+down    move_window down

# Resize active split
map ctrl+shift+home resize_window wider
map ctrl+shift+end  resize_window narrower
map ctrl+shift+page_up   resize_window taller
map ctrl+shift+page_down resize_window shorter
map ctrl+shift+0    resize_window reset

