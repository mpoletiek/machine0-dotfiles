# BACKGROUND
background {
    monitor =
    path = $HOME/.config/hypr/wallpapers/warrior.jpg
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

