# Window & workspace rules

# --- Global hygiene ---
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# --- Smart gaps: remove borders/rounding when only 1 tiled window or fullscreen ---
windowrule {
    name = no-borders-single
    match:float = false
    match:workspace = w[tv1]
    border_size = 0
    rounding = 0
}

windowrule {
    name = no-borders-fullscreen
    match:float = false
    match:workspace = f[1]
    border_size = 0
    rounding = 0
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# --- Hyprland-run floating dock ---
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# --- cmatrix screensaver ---
windowrule {
    name = cmatrix-bg
    match:class = kittyscreensaver
    fullscreen = yes
    idle_inhibit = none
}

# --- Kitty: no blur (terminals read better crisp, saves GPU) ---
windowrule {
    name = kitty-noblur
    match:class = ^(kitty)$
    no_blur = yes
}

# --- Clipboard picker (SUPER+V): floating fzf popup in kitty ---
windowrule {
    name = clipboard-picker
    match:class = ^(clipboard-picker)$
    float = yes
    size = 50% 50%
    center = 1
    no_blur = yes
}

windowrule {
    name = kitty-drop-noblur
    match:class = ^(kitty-drop)$
    no_blur = yes
}

# --- Scratchpad windows (all share special:magic, toggled with SUPER+S) ---
# NOTE: initial workspace placement for browser/discord/telegram/kitty is done
# via [workspace N silent] prefixes in 30-autostart.conf, NOT persistent
# windowrules. This way manually-launched windows open on the current
# workspace, not the autostart target.

windowrule {
    name = kitty-drop-scratch
    match:class = ^(kitty-drop)$
    float = yes
    size = 70% 55%
    center = 1
    workspace = special:magic silent
}

windowrule {
    name = spotify-scratch
    match:class = ^([Ss]potify)$
    float = yes
    size = 80% 75%
    center = 1
    workspace = special:magic silent
}

windowrule {
    name = mousepad-scratch
    match:class = ^([Mm]ousepad)$
    float = yes
    size = 70% 70%
    center = 1
    workspace = special:magic silent
}
