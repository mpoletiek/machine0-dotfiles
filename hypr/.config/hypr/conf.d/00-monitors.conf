# Monitors
# See https://wiki.hypr.land/Configuring/Monitors/
monitor = DP-3, 5120x1440@119.97, 0x0, 1
monitor = HDMI-A-1, 1920x1080@100, 640x-1080, 1
monitor = DP-2, 1920x1080@100, 2560x-1080, 1

# Pin workspaces to monitors so the ultrawide gets WS1 regardless of init order.
workspace = 1, monitor:DP-3, default:true, persistent:true
workspace = 2, monitor:HDMI-A-1, default:true, persistent:true
workspace = 3, monitor:DP-2, default:true, persistent:true
