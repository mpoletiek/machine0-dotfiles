# Look & feel

general {
    gaps_in = 4
    gaps_out = 10

    border_size = 2
    col.active_border = rgb(a7c080) rgb(83c092) 45deg
    col.inactive_border = rgb(3d484d)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 6
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(2d353b99)
    }

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Faster than defaults for snappier feel
    animation = global,        1, 4,    default
    animation = border,        1, 3,    easeOutQuint
    animation = windows,       1, 3,    easeOutQuint
    animation = windowsIn,     1, 3,    easeOutQuint, popin 87%
    animation = windowsOut,    1, 1.5,  linear,       popin 87%
    animation = fadeIn,        1, 1.5,  almostLinear
    animation = fadeOut,       1, 1.5,  almostLinear
    animation = fade,          1, 2,    quick
    animation = layers,        1, 3,    easeOutQuint
    animation = layersIn,      1, 3,    easeOutQuint, fade
    animation = layersOut,     1, 1.5,  linear,       fade
    animation = fadeLayersIn,  1, 1.5,  almostLinear
    animation = fadeLayersOut, 1, 1.5,  almostLinear
    animation = workspaces,    1, 2,    almostLinear, fade
    animation = workspacesIn,  1, 1.5,  almostLinear, fade
    animation = workspacesOut, 1, 2,    almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2      # Always split to the right/bottom (ultrawide columnar)
    smart_split = false
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ----------------------------------------------------------------------------
# Smart gaps — remove padding/borders when only one window is tiled.
# w[tv1] = workspace with exactly 1 tiled visible window
# f[1]   = workspace where any window is fullscreen
# ----------------------------------------------------------------------------
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0
