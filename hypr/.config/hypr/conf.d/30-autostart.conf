# Autostart - ordered for correct init sequence

# 1. dbus environment must be updated before any app that depends on portals
exec-once = dbus-update-activation-environment --all DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP

# 2. Audio stack — sequenced so pipewire-pulse starts after pipewire+wireplumber
# are actually up. Otherwise pulse-only clients (Spotify) can race and fall
# back to raw ALSA, which breaks MPRIS-coordinated track advancement.
exec-once = pipewire
exec-once = sleep 0.5 && wireplumber
exec-once = sleep 1 && pipewire-pulse

# 3. Polkit agent (needed before GUI apps request auth)
exec-once = /usr/libexec/hyprpolkitagent

# 4. Sunset. Wallpaper + idle are now managed by noctalia-shell.
# exec-once = hyprpaper   # rollback: noctalia owns wallpaper via Modules/Background
# exec-once = hypridle    # rollback: noctalia IdleService handles DPMS/lock/suspend
# exec-once = hyprsunset   # rollback: noctalia NightLightService spawns wlsunset

# 5. Status bar (noctalia-shell via noctalia-qs; waybar kept for rollback)
exec-once = sh -c 'ulimit -c unlimited; cd "$HOME"; exec qs -c noctalia-shell 2> "$HOME/.cache/noctalia.stderr.log"'
# exec-once = waybar

# 6. Clipboard history watchers (install `cliphist` to use SUPER+V picker)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# 7. XDG portals (after dbus env is populated)
exec-once = sleep 1 && /usr/libexec/xdg-desktop-portal-hyprland
exec-once = sleep 2 && /usr/libexec/xdg-desktop-portal

# 8. Apps: none autostarted. Launch manually after login for a clean slate.
# Scratchpad (SUPER+S) is empty on boot until you open apps that match the
# special:magic windowrule. Spotify, if used, should be launched by hand to
# avoid racing pipewire-pulse startup (causes MPRIS/ALSA fallback issues).
# Bluetooth Applet
exec-once = blueman-applet

# 9. Razer per-key ripple effect (BlackWidow V3 Pro). Small sleep so
# openrazer-daemon has time to be D-Bus activated before we connect.
exec-once = sh -c 'sleep 3 && exec /home/mpoletiek/Devspace/razer-effects/.venv/bin/python /home/mpoletiek/Devspace/razer-effects/ripple.py >> "$HOME/.cache/razer-ripple.log" 2>&1'
