# Keybindings

# --- Core apps ---
bind = $mainMod, return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
# Noctalia launcher (apps + window search + session search).
bind = $mainMod, SPACE,       exec, qs -c noctalia-shell ipc call launcher toggle

# --- Exit session (moved off SUPER+M to prevent accidental kills) ---
bind = $mainMod SHIFT CTRL, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# --- Window state ---
bind = $mainMod, F, fullscreen, 0           # true fullscreen
bind = $mainMod, M, fullscreen, 1           # maximize (keeps gaps/bar)
bind = $mainMod SHIFT, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# --- Config reload ---
bind = $mainMod CTRL, R, exec, hyprctl reload

# --- Focus: arrows ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move windows: SHIFT + arrows ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Resize submap: SUPER+R enters, arrows resize, ESC/Enter exits ---
bind = $mainMod, R, submap, resize
submap = resize
binde = , left,  resizeactive, -40 0
binde = , right, resizeactive,  40 0
binde = , up,    resizeactive,   0 -40
binde = , down,  resizeactive,   0 40
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace (no-follow)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# --- Special workspace / scratchpad ---
# SUPER+S toggles the "magic" scratchpad. Autostarted apps (kitty-drop, spotify,
# mousepad) all live here — toggle shows all of them at once.
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# --- Scroll through workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# --- Workspace overview (hyprexpo plugin) ---
# Registered via `hyprctl keyword bind` in 30-autostart.conf AFTER hyprpm loads
# the plugin; the dispatcher doesn't exist at cold-start parse time.

# --- Mouse move/resize ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Clipboard history (SUPER+V) ---
# Noctalia clipboard plugin panel; rollback was kitty+fzf+cliphist popup.
bind = $mainMod, V, exec, qs -c noctalia-shell ipc call plugin:clipboard toggle

# --- Color picker (hyprpicker) ---
# Picks a color from anywhere on screen, copies hex to clipboard, shows notif.
bind = $mainMod SHIFT, P, exec, hex=$(hyprpicker -a -f hex) && wl-copy "$hex" && notify-send "Color picked" "$hex"

# --- Notifications (noctalia) ---
bind = $mainMod, N,               exec, qs -c noctalia-shell ipc call notifications dismissOldest    # dismiss top popup
bind = $mainMod SHIFT, N,         exec, qs -c noctalia-shell ipc call notifications dismissAll      # dismiss all popups
bind = $mainMod CTRL, N,          exec, qs -c noctalia-shell ipc call notifications toggleHistory   # open notification history
bind = $mainMod ALT, N,           exec, qs -c noctalia-shell ipc call notifications invokeDefault   # default action on top popup
bind = $mainMod SHIFT CTRL, N,    exec, qs -c noctalia-shell ipc call notifications toggleDND       # DND toggle

# --- Multimedia keys ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Player controls
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# --- Screenshots ---
# PRINT family saves to disk via grimblast (noctalia's screenshot plugin only does clipboard).
bindl = ,                PRINT, exec, f=~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_grimblast.png && grimblast --notify copysave active "$f" && imv "$f"
bindl = $mainMod,        PRINT, exec, f=~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S)_grimblast.png && grimblast --notify copysave area    "$f" && imv "$f"
# CTRL+PRINT: noctalia screenshot plugin — freeze + clipboard-only (faster, no file).
bindl = $mainMod CTRL,   PRINT, exec, qs -c noctalia-shell ipc call plugin:screenshot takeScreenshot region

# --- Lock / screensaver ---
bindl = $mainMod, L,        exec, qs -c noctalia-shell ipc call lockScreen lock
bindl = $mainMod SHIFT, L,  exec, qs -c noctalia-shell ipc call sessionMenu lockAndSuspend   # lock then suspend
bindl = $mainMod, BACKSPACE, exec, kitty --class kittyscreensaver cmatrix -C red

# --- Noctalia panels ---
bind = $mainMod, A,          exec, qs -c noctalia-shell ipc call controlCenter toggle    # quick toggles / status
bind = $mainMod, I,          exec, qs -c noctalia-shell ipc call idleInhibitor toggle    # presentation/long-read mode
bind = $mainMod, X,          exec, qs -c noctalia-shell ipc call sessionMenu toggle      # power / logout / reboot
bind = $mainMod SHIFT, X,    exec, qs -c noctalia-shell ipc call settings toggle         # noctalia settings
bind = $mainMod SHIFT, W,    exec, qs -c noctalia-shell ipc call wallpaper toggle        # wallpaper picker

# --- Noctalia plugins ---
bind = $mainMod, T,          exec, qs -c noctalia-shell ipc call plugin:timer toggle              # timer
bind = $mainMod SHIFT, M,    exec, qs -c noctalia-shell ipc call plugin:notes-scratchpad togglePanel   # notes scratchpad
bind = $mainMod SHIFT, R,    exec, qs -c noctalia-shell ipc call plugin:screen-recorder toggle   # screen recorder
